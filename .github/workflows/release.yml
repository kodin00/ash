name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"
      - name: Package binary and checksum
        shell: bash
        run: |
          set -euo pipefail
          archive="ash-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/$archive" ash
          (cd dist && shasum -a 256 "$archive" > "$archive.sha256")
      - uses: actions/upload-artifact@v5
        with:
          name: ash-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Add installer to release assets
        run: cp install.sh dist/ash-installer.sh
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --generate-notes \
              --title "ash $GITHUB_REF_NAME"
          fi
